<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4e54c8" />
      <stop offset="100%" stop-color="#8f94fb" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)" />
  
  <!-- Calendar/Timetable Board -->
  <rect x="106" y="126" width="300" height="280" rx="24" fill="#ffffff" filter="url(#shadow)" />
  
  <!-- Header of the board -->
  <path d="M 106 150 Q 106 126 130 126 L 382 126 Q 406 126 406 150 L 406 186 L 106 186 Z" fill="#ff6b6b" />
  
  <!-- Rings -->
  <rect x="156" y="96" width="20" height="50" rx="10" fill="#e0e0e0" />
  <rect x="160" y="100" width="12" height="42" rx="6" fill="#b0b0b0" />
  <rect x="336" y="96" width="20" height="50" rx="10" fill="#e0e0e0" />
  <rect x="340" y="100" width="12" height="42" rx="6" fill="#b0b0b0" />

  <!-- Grid/Schedule Lines -->
  <!-- Left column (time) -->
  <rect x="136" y="216" width="40" height="20" rx="6" fill="#f0f0f0" />
  <rect x="136" y="256" width="40" height="20" rx="6" fill="#f0f0f0" />
  <rect x="136" y="296" width="40" height="20" rx="6" fill="#f0f0f0" />
  <rect x="136" y="336" width="40" height="20" rx="6" fill="#f0f0f0" />

  <!-- Subject Blocks -->
  <rect x="196" y="216" width="70" height="20" rx="6" fill="#e8f5e8" />
  <rect x="286" y="216" width="90" height="20" rx="6" fill="#e8f0fe" />
  
  <rect x="196" y="256" width="90" height="20" rx="6" fill="#fef9e7" />
  <rect x="306" y="256" width="70" height="20" rx="6" fill="#ffebee" />

  <rect x="196" y="296" width="50" height="20" rx="6" fill="#e0f7fa" />
  <rect x="266" y="296" width="110" height="20" rx="6" fill="#f3e5f5" />

  <rect x="196" y="336" width="80" height="20" rx="6" fill="#fff3e0" />
  <rect x="296" y="336" width="80" height="20" rx="6" fill="#e8f5e8" />
</svg>